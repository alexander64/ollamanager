name: Release

on:
  push:
    branches: [main]
    paths:
      - VERSION
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Zip .app
        run: |
          cd dist
          zip -r OllamaManager.app.zip OllamaManager.app

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OllamaManager v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/OllamaManager.dmg
            dist/OllamaManager.app.zip
