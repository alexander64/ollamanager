name: Release

on:
  push:
    branches: [main]
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14   # ARM64 (M1) — necessario per mlx e PBS aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache Python standalone
        uses: actions/cache@v4
        with:
          path: .build_cache
          key: pbs-python-${{ runner.arch }}-3.11.12-20250409

      - name: Build (includes Python embed)
        run: bash build.sh

      - name: Zip .app
        run: cd dist && zip -r OllamaManager.app.zip OllamaManager.app

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OllamaManager v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/OllamaManager.dmg
            dist/OllamaManager.app.zip
